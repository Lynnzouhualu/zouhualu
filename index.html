<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#FAF5EC">
<title>走花路</title>
<style>
body{margin:0;background:#FAF5EC;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif}
.loader{text-align:center;color:#2B4A37}
.loader .icon{font-size:48px;margin-bottom:12px;animation:bounce 1.2s ease-in-out infinite}
.loader .text{font-size:15px;letter-spacing:4px;opacity:.6;animation:fade 1.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fade{0%,100%{opacity:.3}50%{opacity:.8}}
</style>
</head>
<body>
<div class="loader">
  <div class="icon">🌿</div>
  <div class="text">走花路</div>
</div>
<script>
(function(){
  var ua = navigator.userAgent || "";
  var isMobile = /iPhone|iPad|iPod|Android|Mobile|Opera Mini|Opera Mobi/i.test(ua);
  var params = location.search;
  var forceDesktop = params.indexOf("mode=desktop") >= 0;
  var forceMobile = params.indexOf("mode=mobile") >= 0;
  if (forceDesktop || (!isMobile && !forceMobile)) {
    location.replace("desktop.html");
  } else {
    location.replace("mobile.html");
  }
})();
</script>
</body>
</html>
