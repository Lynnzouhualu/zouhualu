<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#FAF5EC">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>走花路 · 桌面版</title>
<style>

:root{--cream:#FAF5EC;--parchment:#F2E8D5;--forest:#2B4A37;--forest-mid:#3D6B52;--forest-light:#5A8F6E;--sage:#8EAD9A;--terra:#C4735A;--gold:#C4A25E;--plum:#7B5070;--ink:#1E2A22;--text2:#5A6B5F;--text3:#8A9A8E;--card:#fff;--border:#E8DFD0;--sidebar-w:260px;--safe-top:0px;--safe-bot:0px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue','Noto Sans SC',system-ui,sans-serif;color:var(--ink);background:var(--cream);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}

/* LAYOUT */
#app{display:flex;height:100vh;width:100%}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#1E2A22 0%,#2B4A37 100%);color:#E8DFD0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-brand{padding:36px 28px 28px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand h1{font-size:24px;font-weight:700;color:#fff;letter-spacing:3px}
.sidebar-brand p{font-size:12px;color:rgba(255,255,255,.45);margin-top:6px;letter-spacing:1px}
.sidebar-nav{flex:1;padding:20px 14px}
.sidebar-btn{display:flex;align-items:center;gap:14px;width:100%;padding:14px 18px;border:none;background:none;color:rgba(255,255,255,.55);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border-radius:14px;transition:all .2s;text-align:left;margin-bottom:6px}
.sidebar-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.sidebar-btn.active{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.sidebar-btn .sicon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(255,255,255,.06);font-size:22px;flex-shrink:0}
.sidebar-btn.active .sicon{background:rgba(255,255,255,.15)}
.sidebar-foot{padding:20px 28px;font-size:11px;color:rgba(255,255,255,.25);border-top:1px solid rgba(255,255,255,.08);line-height:1.6}

.main-area{margin-left:var(--sidebar-w);flex:1;overflow-y:auto;position:relative}
.screen{display:none;min-height:100%}
.screen.active{display:block;padding:48px 56px 80px;max-width:1100px;margin:0 auto;width:100%}

/* ONBOARD */
.onboard-wrap{display:none;position:fixed;inset:0;z-index:200;background:var(--cream)}
.onboard-wrap.active{display:flex;align-items:center;justify-content:center}
.onboard{padding:48px;background:linear-gradient(135deg,#1E2A22 0%,#2B4A37 40%,#3D6B52 100%);text-align:center;border-radius:24px;max-width:560px;width:90%;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.onboard h1{font-size:36px;font-weight:700;color:#fff;letter-spacing:4px;margin-bottom:8px}
.onboard .sub{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:36px}
.onboard .inp{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:17px;padding:16px 20px;border-radius:14px;text-align:center;width:100%}
.onboard .inp::placeholder{color:rgba(255,255,255,.35)}
.onboard .inp:focus{border-color:rgba(255,255,255,.5);outline:none;background:rgba(255,255,255,.15)}
.plant-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0}
.plant-opt{padding:20px 12px;border-radius:16px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);cursor:pointer;transition:.2s;text-align:center;color:#fff}
.plant-opt:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.plant-opt.sel{border-color:#C4A25E;box-shadow:0 0 0 3px rgba(196,162,94,.3);background:rgba(196,162,94,.12)}
.plant-opt .emoji{font-size:36px;margin-bottom:8px}
.plant-opt .pname{font-size:14px;font-weight:600}
.plant-opt .pdesc{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}

/* BUTTONS & INPUTS */
.btn{border:none;cursor:pointer;font-family:inherit;padding:14px 32px;border-radius:14px;font-size:15px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--forest);color:#fff;box-shadow:0 4px 20px rgba(43,74,55,.25)}
.btn-g{background:linear-gradient(135deg,var(--gold),#D4B06E);color:#fff;box-shadow:0 4px 20px rgba(196,162,94,.25)}
.inp{width:100%;padding:14px 18px;border:1.5px solid var(--border);border-radius:14px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);outline:none;transition:.2s}
.inp:focus{border-color:var(--forest-mid)}

/* HOME */
.home-hero{margin-bottom:44px}
.home-hero .greet{font-size:13px;color:var(--text3);letter-spacing:3px;text-transform:uppercase}
.home-hero h1{font-size:30px;font-weight:700;margin-top:8px;color:var(--forest)}
.home-hero .plant-card{display:inline-flex;align-items:center;gap:12px;margin-top:16px;padding:10px 20px 10px 14px;border-radius:40px;background:var(--card);border:1px solid var(--border);font-size:13px;color:var(--text2)}
.home-hero .plant-card .pemoji{font-size:24px}
.home-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:48px}
.home-card{padding:32px 24px;border-radius:20px;cursor:pointer;transition:.25s;border:1px solid var(--border);background:var(--card)}
.home-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.home-card .hc-icon{font-size:40px;margin-bottom:16px}
.home-card .hc-title{font-size:17px;font-weight:700;margin-bottom:8px}
.home-card .hc-desc{font-size:13px;color:var(--text2);line-height:1.6}

/* IDENTIFY */
.id-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px;min-height:480px}
.cam-area{border-radius:20px;overflow:hidden;background:#111;position:relative;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.cam-area img{width:100%;height:100%;object-fit:cover}
.cam-placeholder{text-align:center;color:rgba(255,255,255,.5)}
.cam-placeholder .ico{font-size:52px;margin-bottom:14px}
.cam-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.cam-btn{padding:12px 24px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.cam-btn:hover{border-color:var(--forest-mid)}
.cam-btn.primary{background:var(--forest);color:#fff;border-color:var(--forest)}
.result-card{padding:28px;border-radius:20px;background:var(--card);border:1px solid var(--border)}
.result-name{font-size:22px;font-weight:700}
.result-score{font-size:13px;color:var(--forest-light);font-weight:500;margin-left:8px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.result-item{padding:16px;border-radius:12px;background:var(--parchment)}
.result-item .label{font-size:11px;color:var(--text3);margin-bottom:4px}
.result-fact{margin-top:16px;padding:16px 20px;border-radius:14px;background:#FFF8E1;font-size:13px;line-height:1.7}
.loading-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;border-radius:20px}
.spinner{font-size:36px;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sec-title{font-size:14px;font-weight:600;color:var(--text2);margin-top:24px;margin-bottom:8px;letter-spacing:1px}
.quick-flowers{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.quick-chip{padding:8px 16px;border-radius:20px;background:var(--card);border:1px solid var(--border);font-size:13px;cursor:pointer;transition:.2s}
.quick-chip:hover{background:var(--parchment)}
.warn-bar{padding:12px 18px;border-radius:14px;font-size:13px;line-height:1.5;margin-bottom:16px}
.warn-yellow{background:#FFF8E1;border:1px solid #FFD54F;color:#8D6E00}
.warn-green{background:#E8F5E9;border:1px solid #A5D6A7;color:#2E7D32}

/* GIFT */
.gift-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.gift-card{padding:32px 24px;border-radius:20px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:.25s;text-align:center}
.gift-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.gift-card .emoji{font-size:42px;margin-bottom:12px}
.gift-card .gname{font-size:16px;font-weight:700}
.gift-back,.enc-back{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:12px;background:none;border:1px solid var(--border);font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:24px;transition:.2s}
.gift-back:hover,.enc-back:hover{background:var(--parchment)}
.gf-sub{font-size:14px;font-weight:600;color:var(--text2);letter-spacing:.5px}
.gf-chips{display:flex;flex-wrap:wrap;gap:10px}
.gf-chip{padding:10px 18px;border-radius:24px;background:var(--card);border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;transition:.2s}
.gf-chip:hover{border-color:var(--forest-mid)}
.gf-chip.sel{background:var(--forest);color:#fff;border-color:var(--forest)}
.color-dot{width:40px;height:40px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.2s;flex-shrink:0}
.color-dot.sel{border-color:var(--forest);box-shadow:0 0 0 3px rgba(43,74,55,.2)}
.gr-card{border-radius:20px;overflow:hidden;background:var(--card);border:1px solid var(--border);margin-bottom:20px}
.gr-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#f0f0f0}
.gr-body{padding:24px}
.gr-name{font-size:20px;font-weight:700;margin-bottom:6px}
.gr-flowers{font-size:13px;color:var(--text2);margin-bottom:12px}
.gr-lang{font-size:14px;color:var(--plum);font-weight:600;margin-bottom:8px}
.gr-bless{padding:14px 18px;border-radius:14px;background:var(--parchment);font-size:14px;line-height:1.6;margin-bottom:12px}
.gr-meta{display:flex;gap:12px;font-size:12px;color:var(--text3)}
.gr-overlay{position:relative}
.gr-match-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;padding:4px 10px;border-radius:8px;font-size:11px}
.tg{display:inline-block;padding:4px 12px;border-radius:20px;background:var(--parchment);font-size:12px;font-weight:500}

/* ENCYCLOPEDIA */
.enc-search{display:flex;gap:10px;margin-bottom:28px}
.enc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.enc-card{padding:20px;border-radius:18px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:.2s;display:flex;gap:14px;align-items:center}
.enc-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.07);transform:translateY(-2px)}
.enc-card img{width:64px;height:64px;border-radius:14px;object-fit:cover;flex-shrink:0;background:var(--parchment)}
.enc-card .ec-name{font-size:15px;font-weight:700}
.enc-card .ec-cat{font-size:12px;color:var(--text3);margin-top:2px}
.enc-card .ec-diff{font-size:11px;margin-top:4px;padding:2px 8px;border-radius:10px;display:inline-block}
.enc-detail{max-width:800px}
.enc-detail img{width:100%;max-height:400px;object-fit:cover;border-radius:20px;margin-bottom:24px}
.enc-detail h2{font-size:28px;font-weight:700;margin-bottom:4px}
.enc-detail .ed-sub{font-size:14px;color:var(--text2);margin-bottom:24px}
.care-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.care-card{padding:18px;border-radius:14px;background:var(--card);border:1px solid var(--border)}
.care-card .cc-icon{font-size:22px;margin-bottom:8px}
.care-card .cc-title{font-size:13px;font-weight:700;margin-bottom:6px}
.care-card .cc-val{font-size:13px;color:var(--text2);line-height:1.6}
.enc-cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.enc-cat-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;font-family:inherit}
.enc-cat-btn:hover{border-color:var(--forest-mid)}
.enc-cat-btn.sel{background:var(--forest);color:#fff;border-color:var(--forest)}
.fallback-img{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,var(--parchment),var(--border))}
/* Encyclopedia detail styles (used by mobile render shared in desktop) */
.hero-img{width:100%;max-height:350px;object-fit:cover;border-radius:20px;margin-bottom:20px}
.hero-fb{width:100%;height:200px;border-radius:20px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;font-size:60px;background:linear-gradient(135deg,var(--parchment),var(--border))}
.dname{font-size:28px;font-weight:700}.dfl{font-size:14px;color:var(--plum);margin-bottom:20px}
.care-item{padding:16px;border-radius:14px;background:var(--card);border:1px solid var(--border);margin-bottom:10px}
.clabel{font-size:12px;color:var(--text3);margin-bottom:4px}
.cval{font-size:14px;line-height:1.6}
.care-section{margin-top:24px}.cs-title{font-size:16px;font-weight:700;margin-bottom:12px}
.cs-val{font-size:14px;color:var(--text2);line-height:1.7}
.region-box{margin-top:20px;padding:16px;border-radius:14px;background:#FFF8E1;font-size:13px;line-height:1.7}
.enc-img-fb{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,var(--parchment),var(--border));flex-shrink:0}
.enc-search-wrap{display:flex;gap:10px;margin-bottom:20px}
.cat-chip{padding:6px 14px;border-radius:20px;background:var(--parchment);font-size:12px;font-weight:500}
/* Encyclopedia list item styles */
.enc-item{display:flex;gap:14px;align-items:center;padding:16px;border-radius:16px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:.2s;margin-bottom:10px}
.enc-item:hover{box-shadow:0 4px 20px rgba(0,0,0,.06)}
.enc-img{width:56px;height:56px;border-radius:12px;object-fit:cover;flex-shrink:0}
.info{flex:1}.ename{font-size:15px;font-weight:700}.edesc{font-size:12px;color:var(--text3);margin-top:2px}
.ediff{font-size:11px;margin-top:4px;padding:2px 8px;border-radius:10px;display:inline-block}
.efl{font-size:12px;color:var(--plum);margin-top:4px}

/* FORTUNE */
.fortune-wrap{max-width:700px;margin:0 auto;text-align:center}
.fortune-header{margin-bottom:36px}
.fortune-header h2{font-size:28px;font-weight:700;color:var(--forest)}
.fortune-header p{font-size:14px;color:var(--text2);margin-top:6px}
.fortune-deck{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px}
.fortune-card{padding:24px 16px;border-radius:18px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:.25s;text-align:center}
.fortune-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.fortune-card .fc-emoji{font-size:36px;margin-bottom:10px}
.fortune-card .fc-name{font-size:14px;font-weight:700}
.fortune-result{max-width:500px;margin:0 auto;text-align:center}
.fr-card{padding:36px;border-radius:24px;background:var(--card);border:1px solid var(--border);margin-top:24px}
.fr-emoji{font-size:56px;margin-bottom:16px}
.fr-name{font-size:24px;font-weight:700;color:var(--forest);margin-bottom:8px}
.fr-msg{font-size:16px;line-height:1.8;color:var(--ink);margin-bottom:20px}
.fr-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.fr-tag{padding:6px 14px;border-radius:20px;background:var(--parchment);font-size:12px;font-weight:500}
/* Fortune mobile-shared styles */
.fort-zone{margin-top:20px}.daily-card{padding:20px;border-radius:16px;background:var(--card);border:1px solid var(--border);margin-bottom:20px}
.dlabel{font-size:12px;color:var(--text3)}.dtext{font-size:14px;margin-top:4px}
.femoji{font-size:40px;margin-bottom:8px}.ftext{font-size:15px;line-height:1.7}
.flucky{font-size:13px;color:var(--gold);margin-top:8px}.fadvice{font-size:13px;color:var(--text2);margin-top:8px}
.month-strip{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
.month-chip{padding:8px 14px;border-radius:14px;background:var(--card);border:1px solid var(--border);font-size:12px;text-align:center}

/* MONTHLY */
.monthly-section{margin-top:40px}
.monthly-title{font-size:18px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.monthly-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.monthly-card{padding:18px;border-radius:16px;background:var(--card);border:1px solid var(--border);text-align:center}
.monthly-card .mc-emoji{font-size:28px}
.monthly-card .mc-name{font-size:13px;font-weight:600;margin-top:6px}

/* FLOWER INFO MODAL (replaces alert) */
.flower-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.flower-modal{background:var(--card);border-radius:20px;padding:28px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.flower-modal-close{position:absolute;top:12px;right:16px;font-size:20px;cursor:pointer;color:var(--text3);background:none;border:none}
.flower-modal h3{font-size:20px;font-weight:700;margin-bottom:4px}
.flower-modal .fm-latin{font-size:13px;color:var(--text3);margin-bottom:16px}
.flower-modal .fm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.flower-modal .fm-item{padding:12px;border-radius:12px;background:var(--parchment)}
.flower-modal .fm-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.flower-modal .fm-fact{padding:14px;border-radius:14px;background:#FFF8E1;font-size:13px;line-height:1.6;margin-top:12px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--sage)}

</style>
</head>
<body>

<!-- ONBOARD OVERLAY -->
<div class="onboard-wrap" id="scr-onboard">
  <div class="onboard" id="onboard-content"></div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h1>🌿 走花路</h1>
      <p>植物科普 · 花艺生活</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-foot">走花路 v1.0<br>植物让生活更美好</div>
  </aside>
  <div class="main-area">
    <div class="screen" id="tab-home"></div>
    <div class="screen" id="tab-identify"></div>
    <div class="screen" id="tab-gift"></div>
    <div class="screen" id="tab-encyclopedia"></div>
    <div class="screen" id="tab-fortune"></div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">

<script>
// Global error handler - show errors on screen for mobile debugging
window.onerror = function(msg, url, line, col, err) {
  var d = document.getElementById("onboard-content");
  if (d) d.innerHTML = '<div style="padding:20px;text-align:left;color:#c00;font-size:12px;font-family:monospace;word-break:break-all">' +
    '<b>JS Error:</b><br>' + msg + '<br><br><b>Line:</b> ' + line + ', Col: ' + col +
    (err && err.stack ? '<br><br><b>Stack:</b><br>' + err.stack.replace(/\n/g,'<br>') : '') + '</div>';
  return false;
};
window.onunhandledrejection = function(e) {
  var d = document.getElementById("onboard-content");
  if (d) d.innerHTML = '<div style="padding:20px;color:#c00;font-size:12px">Promise Error: ' + e.reason + '</div>';
};
// ========== API BASE AUTO-DETECT ==========
// On GitHub Pages: use Cloudflare Worker; on local server: use same-origin
var WORKER_API = "https://zouhualu-api.zhangaili-zal.workers.dev";
var API_BASE = (location.hostname.indexOf("github.io") >= 0 || location.hostname.indexOf("zouhualu") >= 0) ? WORKER_API : "";

var giftBlessings={
partner:{
love:["遇见你之前，人间不过是一场路过；遇见你之后，每一朵花都有了名字。","世间三千繁华，不及你回眸一笑。这束花，是我对你说不完的情书。","我曾以为浪漫是远方的风景，后来发现，浪漫是你。","你就像{花束}，每次见面都让我心动不已。","想把全世界的花都搬到你面前，后来发现，你就是我眼中最美的花。","有些人用文字表白，我用花。这束花里藏着我一整个夏天的喜欢。","和你在一起，连路边的野花都格外好看。","我攒了好久的心动，都装在这束{花束}里了。"],
birthday:["岁岁年年，你是人间值得。生日快乐，我最好的花。","又一年花开，庆幸身边依然是你。年年有今日，岁岁有今朝。","时光不老，你恰好是我见过最好看的花。生日快乐。","生日快乐。谢谢你让我的人生多了这么多值得庆祝的日子。","你是上天送给我最好的礼物，比任何花都珍贵。新的一岁，继续一起看花开花落。","又长大了一岁，但在我眼里你永远是最初让我心动的那个人。"],

    // 包装费 (按花材档次浮动)
    var avgW = materialCost / stems.reduce(function(s, x) { return s + x.count; }, 0);
    var wrapCost = avgW > 12 ? 40 : (avgW > 6 ? 25 : 15);
    // 设计费 (按花材种类数和档次)
    var designFee = sf.length >= 3 ? (sf.some(function(x) { return x.flower.t === "p" || x.flower.t === "l"; }) ? 50 : 25) : 10;
    var baseCost = materialCost + wrapCost + designFee;
    // 加价倍数 (花店运营2.2倍)
    var markup = 2.2;
    var retailPrice = Math.round(baseCost * markup / 10) * 10; // 取整到10元
    // 预算精准适配: 按比例缩放支数
    if (form.budget) {
      for (var bi = 0; bi < GF_BUDGET.length; bi++) {
        if (GF_BUDGET[bi].id === form.budget) {
          var bMin = GF_BUDGET[bi].min, bMax = GF_BUDGET[bi].max;
          if (retailPrice > bMax) {
            var scale = bMax / retailPrice;
            for (var si = 0; si < stems.length; si++) {
              stems[si].count = Math.max(1, Math.round(stems[si].count * scale));
            }
            materialCost = stems.reduce(function(s, x) { return s + x.flower.w * x.count; }, 0);
            retailPrice = Math.round((materialCost + wrapCost + designFee) * markup / 10) * 10;
            if (retailPrice > bMax) {
              // 微调: 逐个减少直到在预算内
              for (var adj = 0; adj < 10; adj++) {
                var maxIdx = 0;
                for (var mi = 1; mi < stems.length; mi++) { if (stems[mi].count > stems[maxIdx].count) maxIdx = mi; }
                if (stems[maxIdx].count > 1) stems[maxIdx].count--;
                materialCost = stems.reduce(function(s, x) { return s + x.flower.w * x.count; }, 0);
                retailPrice = Math.round((materialCost + wrapCost + designFee) * markup / 10) * 10;
                if (retailPrice <= bMax) break;
              }
            }
          }
          if (retailPrice < bMin) retailPrice = bMin;
          break;
        }
      }
    }
    var totalStems = stems.reduce(function(s, x) { return s + x.count; }, 0);
    var avgS = sf.reduce(function(sum, x) { return sum + x.score; }, 0) / sf.length;
    var matchPct = Math.min(99, Math.round((avgS / maxS) * 100));
    var bless = "";
    var img = pickGiftImg(form, main.n, k);
    var imgKey = img.replace("img/","");
    var namePool = giftImgNames[imgKey] || ["花间絮语"];
    var bName = namePool[Math.floor(Math.random() * namePool.length)];
    var bPool = (giftBlessings[form.who] && giftBlessings[form.who][sceneId]) ||
                (giftBlessings[form.who] && (function(){ for(var sk in giftBlessings[form.who]){ if(giftBlessings[form.who][sk] && giftBlessings[form.who][sk].length>=2) return giftBlessings[form.who][sk]; } return null; })()) ||
                (giftBlessings.generic && giftBlessings.generic[sceneId]) ||
                giftBlessings.generic.daily ||
                ["愿这束花为你带来美好"];
    bless = bPool[Math.floor(Math.random() * bPool.length)];
    bless = bless.replace(/\{花束\}/g, bName);
    results.push({
      name: bName,
      flowers: fNames,
      lang: giftFL[main.n] || "美好与祝福",
      bless: bless,
      price: retailPrice,
      stems: totalStems,
      emoji: main.e,
      color: main.c,
      img: img,
      match: matchPct
    });
  }
  return results;
}

};

// ========== HELPERS ==========
function Q(sel) { return document.querySelector(sel); }
function QA(sel) { return document.querySelectorAll(sel); }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ========== STORAGE ==========
function saveState() {
  try {
    var data = { name: S.name, plantId: S.plant ? S.plant.id : null, tab: S.tab };
    localStorage.setItem("zouhualu", JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem("zouhualu");
    if (!raw) return false;
    var data = JSON.parse(raw);
    if (!data.name) return false;
    S.name = data.name;
    if (data.plantId) {
      for (var i = 0; i < spiritPlants.length; i++) {
        if (spiritPlants[i].id === data.plantId) { S.plant = spiritPlants[i]; break; }
      }
    }
    if (data.tab) S.tab = data.tab;
    return true;
  } catch(e) { return false; }
}

function doLogout() {
  try { localStorage.removeItem("zouhualu"); } catch(e) {}
  S.name = ""; S.plant = null; S.step = 0; S.tab = "home";
  Q("#scr-main").classList.remove("active");
  Q("#scr-onboard").classList.add("active");
  renderOnboard();
}

function greeting() {
  var hr = new Date().getHours();
  if (hr < 6) return "\u591C\u6DF1\u4E86";
  if (hr < 9) return "\u65E9\u5B89";
  if (hr < 12) return "\u4E0A\u5348\u597D";
  if (hr < 14) return "\u4E2D\u5348\u597D";
  if (hr < 18) return "\u4E0B\u5348\u597D";
  if (hr < 22) return "\u665A\u4E0A\u597D";
  return "\u591C\u6DF1\u4E86";
}

var monthNames = ["\u4E00\u6708","\u4E8C\u6708","\u4E09\u6708","\u56DB\u6708","\u4E94\u6708","\u516D\u6708","\u4E03\u6708","\u516B\u6708","\u4E5D\u6708","\u5341\u6708","\u5341\u4E00\u6708","\u5341\u4E8C\u6708"];

function findFlower(name) {
  for (var i = 0; i < flowerDB.length; i++) {
    if (flowerDB[i].name === name) return flowerDB[i];
  }
  for (var i = 0; i < flowerDB.length; i++) {
    if (name.indexOf(flowerDB[i].name) >= 0) return flowerDB[i];
  }
  return null;
}

      '<div style="margin-top:48px"><button class="btn btn-p" style="padding:16px 48px;font-size:16px" onclick="S.step=1;renderOnboard()">\u5F00\u59CB\u6211\u7684\u82B1\u8DEF</button></div>' +

  } else if (S.step === 1) {
    c.innerHTML = '<div style="width:100%;max-width:320px;text-align:center">' +
      '<div style="display:flex;justify-content:center;gap:8px;margin-bottom:20px"><div style="width:24px;height:8px;border-radius:4px;background:#C4A25E;transition:.3s"></div><div style="width:8px;height:8px;border-radius:4px;background:#E8DFD0;transition:.3s"></div></div>' +

      '<p style="color:#5A6B5F;font-size:14px;margin-bottom:36px">\u7ED9\u81EA\u5DF1\u53D6\u4E00\u4E2A\u82B1\u8DEF\u4E0A\u7684\u6635\u79F0\u5427</p>' +
      '<input class="inp" id="name-input" placeholder="\u8F93\u5165\u4F60\u7684\u540D\u5B57" maxlength="12" style="text-align:center;font-size:20px;font-weight:600;margin-bottom:28px">' +
      '<button class="btn btn-p" style="width:100%;justify-content:center;padding:16px" onclick="onNameSubmit()">\u4E0B\u4E00\u6B65 \u2192</button></div>';
    setTimeout(function() { var inp = Q("#name-input"); if (inp) inp.focus(); }, 100);

  } else if (S.step === 2) {
    var html = '<div style="width:100%;max-width:320px;text-align:center">' +
      '<div style="display:flex;justify-content:center;gap:8px;margin-bottom:20px"><div style="width:8px;height:8px;border-radius:4px;background:#E8DFD0;transition:.3s"></div><div style="width:24px;height:8px;border-radius:4px;background:#C4A25E;transition:.3s"></div></div>' +
      '<p style="font-size:13px;color:#8A9A8E;letter-spacing:4px;margin-bottom:12px">\u7B2C\u4E8C\u6B65</p>' +
      '<h2 style="font-size:24px;font-weight:700;color:#2B4A37;margin-bottom:8px">\u9009\u62E9\u4F60\u7684\u7075\u5BA0</h2>' +
      '<p style="color:#5A6B5F;font-size:14px">\u9009\u4E00\u682A\u4E0E\u4F60\u7075\u9B42\u76F8\u5951\u7684\u690D\u7269</p>' +

      html += '<div class="plant-opt" onclick="selectPlant(' + i + ')">' +

        '<div class="pdesc">' + esc(p.trait) + '</div></div>';

function onNameSubmit() {
  var inp = Q("#name-input");
  if (inp && inp.value.trim()) {
    S.name = inp.value.trim();
    S.step = 2;
    renderOnboard();
  }
}

function selectPlant(idx) {
  S.plant = spiritPlants[idx];
  var opts = QA(".plant-opt");
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove("sel");
  opts[idx].classList.add("sel");
  setTimeout(enterApp, 300);
}

function enterApp() {
  Q("#scr-onboard").classList.remove("active");
  Q("#scr-main").classList.add("active");
  renderNav();
  switchTab(S.tab || "home");
  checkApiConfig();
  saveState();
}

// ========== NAV ==========
function renderNav() {
  var nav = Q("#bottom-nav");
  if (!nav) return;
  var tabs = [
    {id:"home",icon:"\uD83C\uDFE0",label:"\u9996\u9875"},
    {id:"identify",icon:"\uD83D\uDCF7",label:"\u8BC6\u82B1"},
    {id:"gift",icon:"\uD83D\uDC90",label:"\u82B1\u8BED"},
    {id:"encyclopedia",icon:"\uD83D\uDCD6",label:"\u767E\u79D1"},
    {id:"fortune",icon:"\uD83D\uDD2E",label:"\u82B1\u7B7E"}
  ];
  var html = "";
  for (var i = 0; i < tabs.length; i++) {
    var t = tabs[i];
    var cls = S.tab === t.id ? " active" : "";
    html += '<button class="nav-btn' + cls + '" onclick="switchTab(\'' + t.id + '\')">' +
      '<span class="nav-ico">' + t.icon + '</span><span>' + t.label + '</span></button>';
  }
  nav.innerHTML = html;
}

function switchTab(id) {
  S.tab = id;
  var panels = QA(".tab-panel");
  for (var i = 0; i < panels.length; i++) {
    panels[i].style.display = (panels[i].id === "tab-" + id) ? "" : "none";
  }
  renderNav();
  if (id === "home") renderHome();
  else if (id === "identify") renderIdentify();
  else if (id === "gift") renderGift();
  else if (id === "encyclopedia") renderEncyclopedia();
  else if (id === "fortune") renderFortune();
  saveState();
}

// ========== IDENTIFY ==========
function renderIdentify() {
  var el = Q("#tab-identify");
  if (!el) return;
  var html = '<div class="id-header"><h2>\uD83D\uDCF7 \u8DEF\u8FB9\u8BC6\u82B1</h2>' +
    '<button class="settings-btn" onclick="showSettings()">\u2699\uFE0F</button></div>';

  // Privacy notice
  html += '<div class="warn-bar warn-green">\uD83D\uDD12 \u8BC6\u82B1\u529F\u80FD\u4EC5\u5C06\u60A8\u62CD\u6444\u7684\u7167\u7247\u53D1\u9001\u81F3\u767E\u5EA6AI\u690D\u7269\u8BC6\u522B\u63A5\u53E3\uFF0C\u4E0D\u4F1A\u8BBF\u95EE\u60A8\u7684\u76F8\u518C\u6216\u4E91\u7AEF\u6570\u636E</div>';

  // API config warning
  if (!S.apiOk) {
    html += '<div class="warn-bar warn-yellow">\u26A0\uFE0F \u8BC6\u82B1\u670D\u52A1\u8FDE\u63A5\u4E2D\uFF0C\u8BF7\u7A0D\u5019\u91CD\u8BD5\u3002\u5982\u6301\u7EED\u65E0\u6CD5\u4F7F\u7528\uFF0C\u8BF7\u70B9\u51FB\u53F3\u4E0A\u89D2\u2699\uFE0F\u914D\u7F6E</div>';
  }

  // Camera area
  if (S.photoUrl) {
    html += '<div class="cam-area"><img src="' + S.photoUrl + '" alt="photo">';
    if (S.busy) {
      html += '<div class="loading-overlay"><div class="spinner">\uD83C\uDF31</div><div class="ltxt">\u8BC6\u522B\u4E2D...</div></div>';
    }
    html += '</div>';
  } else {
    html += '<div class="cam-area"><div class="cam-placeholder"><div class="ico">\uD83D\uDCF7</div>' +
      '<p>\u62CD\u4E00\u5F20\u82B1\u8349\u7167\u7247</p>' +
      '<p style="font-size:12px;margin-top:4px">\u6216\u4ECE\u76F8\u518C\u9009\u62E9</p></div>' +
      '<div class="scan-line"></div></div>';
  }

  // Camera actions
  html += '<div class="cam-actions">' +
    '<button class="cam-btn primary" onclick="document.getElementById(\'file-input\').click()">\uD83D\uDCF7 \u62CD\u7167/\u9009\u56FE</button>';
  if (S.photo) {
    html += '<button class="cam-btn" onclick="doIdentify()">\uD83D\uDD0D \u5F00\u59CB\u8BC6\u522B</button>';
  }
  if (S.photoUrl) {
    html += '<button class="cam-btn" onclick="clearPhoto()">\u2716 \u6E05\u9664</button>';
  }
  html += '</div>';

  // API Result
  if (S.apiErr) {
    html += '<div style="margin:0 20px;padding:14px;border-radius:14px;background:#FFF3E0;color:#E65100;font-size:13px">\u274C ' + esc(S.apiErr) + '</div>';
  }
  if (S.apiRes) {
    var r = S.apiRes;
    var fl = findFlower(r.name);
    var score = r.score ? (r.score * 100).toFixed(1) : "?";
    html += '<div class="result-card">';
    html += '<div class="result-name">' + (fl ? fl.emoji : "\uD83C\uDF31") + ' ' + esc(r.name) +
      ' <span class="result-score">' + score + '%</span></div>';
    if (r.latin) html += '<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:2px">' + esc(r.latin) + '</div>';
    if (fl) {
      html += '<div style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.5">' + esc(fl.desc) + '</div>';
      html += '<div class="result-grid">';
      html += '<div class="result-item"><div class="label">\u82B1\u8BED</div>' + esc(fl.lang) + '</div>';
      html += '<div class="result-item"><div class="label">\u82B1\u671F</div>' + esc(fl.season) + '</div>';
      html += '<div class="result-item"><div class="label">\u6D47\u6C34</div>' + esc(fl.water) + '</div>';
      html += '<div class="result-item"><div class="label">\u5149\u7167</div>' + esc(fl.light) + '</div>';
      html += '</div>';
      if (fl.fact) html += '<div class="result-fact">\uD83D\uDCA1 ' + esc(fl.fact) + '</div>';
    } else {
      html += '<div style="font-size:13px;color:var(--text2);margin-top:8px">\u767E\u5EA6AI\u8BC6\u522B\u7ED3\u679C\uFF0C\u672A\u5728\u672C\u5730\u82B1\u5E93\u4E2D\u627E\u5230\u8BE6\u7EC6\u4FE1\u606F</div>';
    }
    html += '</div>';
  }

  // Quick flowers
  if (!S.photoUrl) {
    html += '<div class="sec-title">\u5FEB\u901F\u67E5\u770B</div><div class="quick-flowers">';
    for (var i = 0; i < Math.min(flowerDB.length, 10); i++) {
      html += '<div class="quick-chip" onclick="showFlowerInfo(' + i + ')">' + flowerDB[i].emoji + ' ' + esc(flowerDB[i].name) + '</div>';
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

function doIdentify() {
  if (!S.photo || S.busy) return;

// ========== GIFT ==========
function selectGift(id) {
  S.giftId = id;
  S.giftStep = 1;
  S.giftForm = {scene:id, who:null, color:null, colorCustom:null, flowers:[]};
  S.giftResults = null;
  renderGift();
}
function giftBack() {
  if (S.giftResults) { S.giftResults = null; renderGift(); return; }
  S.giftId = null; S.giftStep = 0; S.giftForm = null; renderGift();
}
function giftSet(field, val) {
  var f = S.giftForm;
  if (field === "who") { f.who = val; }
  else if (field === "color") {
    f.color = val; f.colorCustom = null;
    for (var i = 0; i < giftColorPresets.length; i++) { if (giftColorPresets[i].n === val) { f.colorHex = giftColorPresets[i].h; break; } }
  }
  else if (field === "colorCustom") { f.colorCustom = val; f.color = val; }
  else if (field === "flower") {
    var idx = f.flowers.indexOf(val);
    if (idx >= 0) f.flowers.splice(idx, 1); else f.flowers.push(val);
  }
  renderGift();
}
function giftNext() {
  S.giftResults = giftRec(S.giftId, S.giftForm); renderGift();
}
function giftReset() { S.giftId = null; S.giftStep = 0; S.giftForm = null; S.giftResults = null; renderGift(); }

var CAT_BG = {foliage:"linear-gradient(135deg,#E8F5E9,#C8E6C9)",flowering:"linear-gradient(135deg,#FCE4EC,#F8BBD0)",succulent:"linear-gradient(135deg,#FFF3E0,#FFE0B2)",herb:"linear-gradient(135deg,#E0F2F1,#B2DFDB)",vine:"linear-gradient(135deg,#E8EAF6,#C5CAE9)",tree:"linear-gradient(135deg,#EFEBE9,#D7CCC8)",bulb:"linear-gradient(135deg,#F3E5F5,#CE93D8)",aquatic:"linear-gradient(135deg,#E1F5FE,#B3E5FC)"};

function imgFb(el, cat) {
  var em = CAT_EMOJI[cat] || "🌱";
  var bg = CAT_BG[cat] || CAT_BG.foliage;
  var d = document.createElement("div");
  d.className = "enc-img-fb";
  d.style.background = bg;
  d.textContent = em;
  if (el && el.parentNode) el.parentNode.replaceChild(d, el);
}

function heroFb(el, cat) {
  var em = CAT_EMOJI[cat] || "🌱";
  var bg = CAT_BG[cat] || CAT_BG.foliage;
  var d = document.createElement("div");
  d.className = "hero-fb";
  d.style.background = bg;
  d.textContent = em;
  if (el && el.parentNode) el.parentNode.replaceChild(d, el);
}

function encImgHtml(imgUrl, cat) {
  var bg = CAT_BG[cat] || CAT_BG.foliage;
  var em = CAT_EMOJI[cat] || "🌱";
  if (imgUrl) {
    return '<img class="enc-img" src="' + esc(imgUrl) + '" data-cat="' + cat + '" onerror="imgFb(this,this.dataset.cat)">';
  }
  return '<div class="enc-img-fb" style="background:' + bg + '">' + em + '</div>';
}

function encSearchFn(q) {
  q = (q || "").trim().toLowerCase();
  if (!q) { S.encSearchResults = null; S.encSearch = ""; renderEncyclopedia(); return; }
  S.encSearch = q;
  var results = [];
  var seen = {};
  for (var i = 0; i < encData.length; i++) {
    var p = encData[i];
    if (p.n.toLowerCase().indexOf(q) >= 0 || (p.fl && p.fl.toLowerCase().indexOf(q) >= 0) || p.ds.toLowerCase().indexOf(q) >= 0) {
      results.push({type:"detail", idx:i, name:p.n, cat:p.c, diff:p.d, desc:p.ds, img:p.img, fl:p.fl});
      seen[p.n] = 1;
    }
  }
  for (var j = 0; j < encIndex.length; j++) {
    var e = encIndex[j];
    if (!seen[e[0]] && e[0].toLowerCase().indexOf(q) >= 0) {
      results.push({type:"basic", idx:j, name:e[0], cat:e[1], diff:e[2], desc:e[3], img:"", fl:""});
      seen[e[0]] = 1;
    }
    if (results.length >= 50) break;
  }
  S.encSearchResults = results;
  renderEncyclopedia();
}

function renderEncList(items) {
  var html = "";
  for (var i = 0; i < items.length; i++) {
    var p = items[i];
    var diffColor = p.diff === "\u5165\u95E8\u7EA7" ? "#4CAF50" : (p.diff === "\u4E2D\u7B49" ? "#FF9800" : "#F44336");
    var onclick = p.type === "detail" ? "S.encPlant=" + p.idx + ";renderEncyclopedia()" : "";
    html += '<div class="enc-item" onclick="' + onclick + '">';
    html += encImgHtml(p.img, p.cat);
    html += '<div class="info"><div class="ename">' + esc(p.name) + "</div>";
    html += '<div class="edesc">' + esc(p.desc) + "</div>";
    html += '<div class="ediff" style="color:' + diffColor + '">' + esc(p.diff) + "</div>";
    if (p.fl) html += '<div class="efl">' + esc(p.fl) + "</div>";
    html += "</div></div>";
  }
  return html;
}

  }
  html += '</div><div style="height:10px"></div><div class="enc-list">';

  // Plant list
  var count = 0;
  for (var i = 0; i < encData.length; i++) {
    var p = encData[i];
    if (S.encCat !== "all" && p.c !== S.encCat) continue;
    var diffColor = p.d === "\u5165\u95E8\u7EA7" ? "#4CAF50" : (p.d === "\u4E2D\u7B49" ? "#FF9800" : "#F44336");
    html += '<div class="enc-item" onclick="S.encPlant=' + i + ';renderEncyclopedia()">';
    html += encImgHtml(p.img, p.c);
    html += '<div class="info"><div class="ename">' + esc(p.n) + "</div>";
    html += '<div class="edesc">' + esc(p.ds) + "</div>";
    html += '<div class="ediff" style="color:' + diffColor + '">' + esc(p.d) + "</div>";
    if (p.fl) html += '<div class="efl">' + esc(p.fl) + "</div>";
    html += "</div></div>";
    count++;
  }

  if (count === 0) {
    html += '<div class="enc-no-result">该分类暂无植物</div>';
  }

  html += "</div>";
  el.innerHTML = html;
}

function setEncCat(cat) { S.encCat = cat; S.encSearchResults = null; S.encSearch = ""; renderEncyclopedia(); }



// ========== FORTUNE ==========
function renderFortune() {

  if (!el) return;
  var html = '<div style="padding:calc(14px + var(--safe-top)) 20px 10px"><h2 style="font-size:20px;font-weight:700">\uD83D\uDD2E \u82B1\u7B7E</h2>' +
    '<p style="font-size:13px;color:var(--text2);margin-top:4px">\u62BD\u4E00\u652F\u4ECA\u65E5\u82B1\u7B7E\uFF0C\u83B7\u53D6\u4F60\u7684\u5E78\u8FD0\u82B1\u8BED</p></div>';

  // Daily card
  html += '<div class="daily-card" onclick="showDailyFortune()">' +
    '<div class="dlabel">\u4ECA\u65E5\u82B1\u7B7E</div>' +
    '<div style="display:flex;align-items:center;gap:10px">' +
    '<span style="font-size:32px">' + S.dailyFortune.emoji + '</span>' +
    '<div class="dtext">' + esc(S.dailyFortune.text.substring(0, 50)) + '...</div></div></div>';

  if (S.fortune !== null) {
    var f = fortunes[S.fortune];
    html += '<div class="fort-result"><div class="femoji">' + f.emoji + '</div>' +
      '<div style="font-size:16px;font-weight:700;margin-bottom:8px">' + esc(f.flower) + '</div>' +
      '<div class="ftext">' + esc(f.text) + '</div>' +
      '<div class="flucky">\u2728 \u4ECA\u65E5\u5E78\u8FD0\u8272: ' + esc(f.lucky) + '</div>' +
      '<div class="fadvice">\uD83C\uDF31 ' + esc(f.advice) + '</div>' +
      '<button class="btn btn-g" style="margin-top:16px" onclick="S.fortune=null;renderFortune()">\u518D\u62BD\u4E00\u6B21</button></div>';
  } else {
    html += '<div class="fort-zone"><p style="color:var(--text3);font-size:13px;margin-bottom:16px">\u9009\u62E9\u4E00\u5F20\u82B1\u7B7E\u5361</p></div>';
    html += '<div class="fort-deck">';
    for (var i = 0; i < S.shuffled.length; i++) {
      var f = S.shuffled[i];
      html += '<div class="fort-card" onclick="drawFortune(' + fortunes.indexOf(f) + ')">' + f.emoji + '</div>';
    }
    html += '</div>';
  }

  // Month strip
  html += '<div class="sec-title">\u5341\u4E8C\u6708\u82B1\u4E8B</div><div class="month-strip">';
  var curMon = new Date().getMonth();
  for (var mi = 0; mi < monthFlowers.length; mi++) {
    var mf = monthFlowers[mi];
    var cls = mi === curMon ? " now" : "";
    html += '<div class="month-chip' + cls + '"><div class="m">' + esc(mf.month) + '</div>' +
      '<div class="e">' + mf.emoji + '</div><div class="f">' + esc(mf.flower) + '</div></div>';
  }
  html += '</div>';

  el.innerHTML = html;
}

function drawFortune(idx) { S.fortune = idx; renderFortune(); }
function showDailyFortune() {
  S.fortune = dayIdx;
  renderFortune();
}

if ('serviceWorker' in navigator) {

// ========== DESKTOP OVERRIDES ==========

// Sidebar navigation
function renderNav() {
  var tabs = [
    {id:"home",icon:"🏠",name:"首页"},
    {id:"identify",icon:"📷",name:"路边识花"},
    {id:"gift",icon:"💐",name:"花语礼赠"},
    {id:"encyclopedia",icon:"📖",name:"种花百科"},
    {id:"fortune",icon:"🔮",name:"今日花签"}
  ];
  var html = "";
  for (var i = 0; i < tabs.length; i++) {
    var t = tabs[i];
    html += '<button class="sidebar-btn' + (S.tab === t.id ? ' active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' +
      '<span class="sicon">' + t.icon + '</span><span>' + t.name + '</span></button>';
  }
  var nav = document.getElementById("sidebar-nav");
  if (nav) nav.innerHTML = html;
}

// Enter app
function enterApp() {
  document.getElementById("scr-onboard").classList.remove("active");
  document.getElementById("app").style.display = "flex";
  renderNav();
  switchTab(S.tab || "home");
}

// Onboard rendering
function renderOnboard() {
  document.getElementById("scr-onboard").classList.add("active");
  document.getElementById("app").style.display = "none";
  var el = document.getElementById("onboard-content");
  var step = S.onboardStep || 1;
  // Progress dots
  var dots = '<div style="display:flex;justify-content:center;gap:8px;margin-bottom:28px">';
  for (var d = 1; d <= 2; d++) {
    dots += '<div style="width:' + (d===step?'24px':'8px') + ';height:8px;border-radius:4px;background:' + (d===step?'#C4A25E':'rgba(255,255,255,.25)') + ';transition:.3s"></div>';
  }
  dots += '</div>';
  if (step === 1) {
    el.innerHTML = '<h1>🌿 走花路</h1><p class="sub">植物科普 · 花艺生活</p>' + dots +
      '<input class="inp" id="name-inp" placeholder="你的名字" maxlength="10" value="' + esc(S.name || "") + '">' +
      '<div style="margin-top:24px"><button class="btn btn-g" onclick="onboardNext()" style="width:100%">下一步 →</button></div>';
  } else if (step === 2) {
    var html = '<h1 style="font-size:28px">选一个植物伙伴</h1><p class="sub">TA 会陪你一起走花路</p>' + dots + '<div class="plant-grid">';
    for (var i = 0; i < spiritPlants.length; i++) {
      var p = spiritPlants[i];
      html += '<div class="plant-opt' + (S.plant && S.plant.id === p.id ? ' sel' : '') + '" onclick="onboardPlant(\'' + p.id + '\')">' +
        '<div class="emoji">' + p.emoji + '</div><div class="pname">' + p.name + '</div><div class="pdesc">' + p.trait + '</div></div>';
    }
    html += '</div>';
    el.innerHTML = html;
  }
}

// Map desktop onboard functions to mobile equivalents
function onboardNext() { if (typeof onNameSubmit === "function") onNameSubmit(); }
function onboardPlant(id) { if (typeof selectPlant === "function") selectPlant(id); }

// Quick flower info modal (replaces alert)
function quickFlower(name) {
  var found = null;
  for (var i = 0; i < flowerDB.length; i++) {
    if (flowerDB[i].n === name || flowerDB[i].n.indexOf(name) >= 0) { found = flowerDB[i]; break; }
  }
  if (!found) return;
  var html = '<div class="flower-modal-overlay" onclick="if(event.target===this)this.remove()">' +
    '<div class="flower-modal"><button class="flower-modal-close" onclick="this.closest(\'.flower-modal-overlay\').remove()">✕</button>' +
    '<h3>' + esc(found.n) + '</h3>' +
    (found.latin ? '<p class="fm-latin">' + esc(found.latin) + '</p>' : '') +
    (found.desc ? '<p style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:16px">' + esc(found.desc) + '</p>' : '') +
    '<div class="fm-row">';
  if (found.fl) html += '<div class="fm-item"><div class="fm-label">花语</div><div>' + esc(found.fl) + '</div></div>';
  if (found.care && found.care.w) html += '<div class="fm-item"><div class="fm-label">浇水</div><div>' + esc(found.care.w) + '</div></div>';
  html += '</div>';
  if (found.fun) html += '<div class="fm-fact">💡 <b>趣味知识：</b>' + esc(found.fun) + '</div>';
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

// Fix doLogout for desktop
var _origDoLogout = doLogout;
doLogout = function() {
  S.name = ""; S.plant = null; S.tab = null; S.onboardStep = 1;
  try { localStorage.removeItem("zouhualu"); } catch(e){}
  document.getElementById("app").style.display = "none";
  document.getElementById("scr-onboard").classList.add("active");
  renderOnboard();
};

// Home: 4-column grid
function renderHome() {
  var el = document.getElementById("tab-home");
  if (!el) return;
  var hour = new Date().getHours();
  var greet = hour < 12 ? "早上好" : hour < 18 ? "下午好" : "晚上好";
  var html = '<div class="home-hero"><p class="greet">' + greet + '</p>' +
    '<h1>' + esc(S.name) + ' 的花花世界</h1>';
  if (S.plant) {
    html += '<div class="plant-card"><span class="pemoji">' + S.plant.emoji + '</span><span>' + S.plant.name + ' · ' + S.plant.desc + '</span></div>';
  }
  html += '</div>';
  html += '<div class="home-grid">';
  var cards = [
    {icon:"📷",title:"路边识花",desc:"拍照识别身边的花草",tab:"identify"},
    {icon:"💐",title:"花语礼赠",desc:"场景定制花束推荐",tab:"gift"},
    {icon:"📖",title:"种花百科",desc:"50+植物养护指南",tab:"encyclopedia"},
    {icon:"🔮",title:"今日花签",desc:"每日花语好运签",tab:"fortune"}
  ];
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    html += '<div class="home-card" onclick="switchTab(\'' + c.tab + '\')">' +
      '<div class="hc-icon">' + c.icon + '</div><div class="hc-title">' + c.title + '</div><div class="hc-desc">' + c.desc + '</div></div>';
  }
  html += '</div>';
  if (typeof monthlyFlowers !== "undefined" && monthlyFlowers && monthlyFlowers.length) {
    var month = new Date().getMonth() + 1;
    var mf = monthlyFlowers.filter(function(f) { return f.m.indexOf(month) >= 0; });
    if (mf.length) {
      html += '<div class="monthly-section"><div class="monthly-title">🌸 ' + month + '月当季花卉</div><div class="monthly-grid">';
      for (var j = 0; j < Math.min(mf.length, 8); j++) {
        html += '<div class="monthly-card"><div class="mc-emoji">' + mf[j].emoji + '</div><div class="mc-name">' + esc(mf[j].n) + '</div></div>';
      }
      html += '</div></div>';
    }
  }
  html += '<div style="margin-top:40px;text-align:center"><span onclick="doLogout()" style="font-size:12px;color:var(--text3);cursor:pointer">重新选择灵宠</span></div>';
  el.innerHTML = html;
}

// Identify: 2-column layout
function renderIdentify() {
  var el = document.getElementById("tab-identify");
  if (!el) return;
  var html = '<h2 style="font-size:24px;font-weight:700;margin-bottom:28px">📷 路边识花</h2>';
  html += '<div class="id-layout">';
  html += '<div><div class="cam-area">';
  if (S.photoUrl) {
    html += '<img src="' + S.photoUrl + '" alt="photo">';
    if (S.busy) html += '<div class="loading-overlay"><div class="spinner">🔍</div><p style="margin-top:12px;font-size:14px">AI 识别中...</p></div>';
  } else {
    html += '<div class="cam-placeholder"><div class="ico">📸</div><p>拍一张或上传照片</p></div>';
  }
  html += '</div>';
  html += '<div class="cam-actions"><button class="cam-btn primary" onclick="document.getElementById(\'file-input\').click()">📷 拍照/上传</button>';
  if (S.photoUrl) html += '<button class="cam-btn" onclick="S.photo=null;S.photoUrl=null;S.apiRes=null;S.apiErr=null;renderIdentify()">重新拍</button>';
  if (S.photo && !S.busy && !S.apiRes && !S.apiErr) html += '<button class="cam-btn primary" onclick="doIdentify()">🔍 开始识别</button>';
  html += '</div>';
  html += '<p class="sec-title">💡 快速查看常见花卉</p><div class="quick-flowers">';
  var qf = ["玫瑰","向日葵","茉莉","绿萝","多肉","薄荷","绣球","薰衣草"];
  for (var qi = 0; qi < qf.length; qi++) {
    html += '<div class="quick-chip" onclick="quickFlower(\'' + qf[qi] + '\')">' + qf[qi] + '</div>';
  }
  html += '</div></div>';
  html += '<div>';
  if (S.apiRes) {
    var r = S.apiRes;
    html += '<div class="result-card"><div class="result-name">' + esc(r.name) + '<span class="result-score">' + (r.score * 100).toFixed(1) + '% 匹配</span></div>';
    if (r.desc) html += '<p style="margin-top:10px;font-size:14px;color:var(--text2);line-height:1.7">' + esc(r.desc) + '</p>';
    html += '<div class="result-grid">';
    if (r.latin) html += '<div class="result-item"><div class="label">拉丁学名</div><div>' + esc(r.latin) + '</div></div>';
    if (r.fl) html += '<div class="result-item"><div class="label">花语</div><div>' + esc(r.fl) + '</div></div>';
    if (r.care && r.care.w) html += '<div class="result-item"><div class="label">浇水频率</div><div>' + esc(r.care.w) + '</div></div>';
    if (r.care && r.care.f) html += '<div class="result-item"><div class="label">施肥建议</div><div>' + esc(r.care.f) + '</div></div>';
    html += '</div>';
    if (r.fun) html += '<div class="result-fact">💡 <b>趣味知识：</b>' + esc(r.fun) + '</div>';
    html += '</div>';
  } else if (S.apiErr) {
    html += '<div class="warn-bar warn-yellow">⚠️ ' + esc(S.apiErr) + '</div>';
    html += '<button class="cam-btn" onclick="S.apiErr=null;renderIdentify()">重试</button>';
  } else if (!S.photoUrl) {
    html += '<div style="padding:60px 20px;text-align:center;color:var(--text3)"><div style="font-size:48px;margin-bottom:16px">🌿</div><p>拍一张花的照片<br>AI 帮你识别</p></div>';
  } else {
    html += '<div style="padding:60px 20px;text-align:center;color:var(--text3)"><p>点击「开始识别」查看结果</p></div>';
  }
  html += '</div></div>';
  el.innerHTML = html;
}

// Switch tab
function switchTab(id) {
  S.tab = id;
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  var target = document.getElementById("tab-" + id);
  if (target) target.classList.add("active");
  renderNav();
  if (id === "home") renderHome();
  else if (id === "identify") renderIdentify();
  else if (id === "gift") renderGift();
  else if (id === "encyclopedia") renderEncyclopedia();
  else if (id === "fortune") renderFortune();
  saveState();
}

// Redirect mobile users to mobile version
(function(){
  var ua = navigator.userAgent || "";
  var isMobile = /iPhone|iPad|iPod|Android|Mobile|Opera Mini/i.test(ua);
  var forceMobile = location.search.indexOf("mode=mobile") >= 0;
  if (isMobile || forceMobile) {
    location.replace("index.html?mode=mobile");
  }
})();

// File input listener
document.addEventListener("DOMContentLoaded", function() {
  var fi = document.getElementById("file-input");
  if (fi) {
    fi.addEventListener("change", function(e) {
      var file = e.target.files[0];
      if (!file) return;
      S.photoUrl = URL.createObjectURL(file);
      S.apiRes = null; S.apiErr = null;
      var reader = new FileReader();
      reader.onload = function() { S.photo = reader.result.split(",")[1]; };
      reader.readAsDataURL(file);
      e.target.value = "";
      if (S.tab === "identify") renderIdentify();
    });
  }
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}

// INIT
if (loadState()) {
  enterApp();
  checkApiConfig();
} else {
  S.onboardStep = 1;
  renderOnboard();
}
